<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>JEE Tracker — Parent View</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');
  :root{
    --bg:#121212;--line:rgba(255,255,255,0.09);
    --text:#F2F0EC;--text-dim:#8C8980;--text-faint:#5C5A54;
    --accent:#7FE0A8;--danger:#E27D7D;--warn:#F2C46D;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  #root{max-width:580px;margin:0 auto;padding:20px 16px 80px;}

  .top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .top-row h1{font-family:'Poppins',sans-serif;font-weight:700;font-size:22px;margin:0;color:var(--warn);}
  .role-badge{font-size:11px;background:rgba(242,196,109,0.12);color:var(--warn);
    border:1px solid rgba(242,196,109,0.35);border-radius:20px;padding:3px 10px;}
  .sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;}
  .sync-dot.ok{background:var(--accent);}
  .sync-dot.err{background:var(--danger);}
  .sync-status{font-size:11px;color:var(--text-dim);display:flex;align-items:center;margin-bottom:14px;}

  .date-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
  .date-nav button{background:transparent;border:1px solid var(--line);color:var(--text-dim);
    width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;
    display:flex;align-items:center;justify-content:center;transition:all .15s ease;}
  .date-nav button:hover{border-color:var(--text);color:var(--text);}
  .date-display{font-size:15px;color:var(--text);font-weight:500;cursor:pointer;
    border-bottom:1px dashed var(--line);padding:2px 2px;}
  .today-tag{font-size:11px;color:var(--accent);border:1px solid var(--accent);
    border-radius:20px;padding:2px 9px;}
  .date-input-hidden{position:absolute;opacity:0;pointer-events:none;width:0;height:0;}
  .refresh-btn{background:rgba(127,224,168,0.1);border:1px solid rgba(127,224,168,0.3);
    color:var(--accent);border-radius:20px;padding:5px 14px;font-size:12px;cursor:pointer;
    font-family:'Inter',sans-serif;transition:all .15s;}
  .refresh-btn:hover{background:rgba(127,224,168,0.2);}

  .summary-card{background:#1A1A1A;border-radius:14px;padding:16px 18px;margin-bottom:20px;
    border:1px solid var(--line);}
  .summary-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:12px;}
  .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .summary-item{text-align:center;}
  .summary-num{font-family:'Poppins',sans-serif;font-size:26px;font-weight:700;line-height:1;}
  .summary-num.green{color:var(--accent);}
  .summary-num.red{color:var(--danger);}
  .summary-num.dim{color:var(--text-dim);}
  .summary-sub{font-size:11px;color:var(--text-faint);margin-top:3px;}
  .progress-strip{display:flex;align-items:center;gap:10px;margin-top:14px;}
  .progress-track{flex:1;height:8px;border-radius:4px;background:var(--line);overflow:hidden;}
  .progress-fill{height:100%;border-radius:4px;transition:width .4s ease;}
  .progress-fill.full{background:var(--accent);}
  .progress-fill.partial{background:var(--warn);}
  .progress-fill.low{background:var(--danger);}
  .progress-pct{font-size:13px;font-weight:600;min-width:38px;text-align:right;}

  .section-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;
    color:var(--text-dim);margin:16px 0 8px;}
  .subj-row{display:flex;align-items:center;justify-content:space-between;
    padding:13px 14px;border-bottom:1px solid var(--line);}
  .subj-row:first-child{border-top:1px solid var(--line);}
  .subj-name{font-size:15px;color:var(--text);}
  .ticks{display:flex;gap:8px;}
  .tick-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .tick{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:13px;}
  .tick.done{background:var(--text);border-color:var(--text);color:var(--bg);}
  .tick.done::after{content:"✓";}
  .tick.skip::after{content:"–";color:var(--text-faint);}
  .tick-label{font-size:10px;color:var(--text-faint);text-align:center;}

  .extra-item{display:flex;align-items:center;gap:10px;
    padding:11px 14px;border-bottom:1px solid var(--line);}
  .extra-item:first-child{border-top:1px solid var(--line);}
  .extra-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .extra-dot.done{background:var(--accent);}
  .extra-dot.pending{background:var(--text-faint);}
  .extra-text{font-size:14px;flex:1;}
  .extra-text.done{color:var(--text-faint);text-decoration:line-through;}
  .extra-status{font-size:11px;color:var(--text-faint);}
  .empty-extras{padding:12px 14px;color:var(--text-faint);font-size:13px;border-top:1px solid var(--line);}

  .loading-state{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:13px;}
  .no-data{text-align:center;padding:50px 20px;color:var(--text-faint);font-size:14px;line-height:1.6;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--text);color:var(--bg);padding:8px 18px;border-radius:20px;
    font-size:12.5px;opacity:0;transition:opacity .25s ease;pointer-events:none;z-index:10;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div id="root"><div id="app"><div class="loading-state">Loading…</div></div></div>
<div class="toast" id="toast"></div>
<script>
const FIREBASE_URL = 'https://jee-tracker-95d7e-default-rtdb.asia-southeast1.firebasedatabase.app';
const SUBJECTS=[
  {key:'physics',label:'Physics'},
  {key:'chemistry',label:'Chemistry'},
  {key:'maths',label:'Maths'}
];

function toDateStr(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayStr(){ return toDateStr(new Date()); }
function fmtDateLabel(ds){
  return new Date(ds+'T00:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short',year:'numeric'});
}
function emptyDay(){
  const d={subjects:{},extra:[]};
  SUBJECTS.forEach(s=>{ d.subjects[s.key]={lecture:false,questions:false}; });
  return d;
}

let state={ currentDate:todayStr(), data:null };

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}
function setSyncStatus(ok){
  const el=document.getElementById('sync-status');
  if(el) el.innerHTML=`<span class="sync-dot ${ok?'ok':'err'}"></span>${ok?'Live data':'Connection error'}`;
}

async function fbGet(dateStr){
  try{
    const r=await fetch(`${FIREBASE_URL}/entries/${dateStr}.json`);
    const data=await r.json();
    if(data){
      const base=emptyDay();
      return { subjects:{...base.subjects,...(data.subjects||{})}, extra:data.extra||[] };
    }
    return null;
  }catch(e){ return null; }
}

async function init(){
  buildShell();
  await refreshForDate();
}

function buildShell(){
  document.getElementById('app').innerHTML=`
    <div class="top-row">
      <h1>📊 Student Progress</h1>
      <span class="role-badge">Parent View</span>
    </div>
    <div class="sync-status" id="sync-status"><span class="sync-dot"></span>Connecting…</div>
    <div class="date-row">
      <div class="date-nav"><button id="prev-day">‹</button></div>
      <span class="date-display" id="date-display"></span>
      <span class="today-tag" id="today-tag" style="display:none;">Aaj</span>
      <div class="date-nav"><button id="next-day">›</button></div>
      <input type="date" id="date-input" class="date-input-hidden" max="${todayStr()}">
      <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
    </div>
    <div id="content"><div class="loading-state">Loading…</div></div>
  `;
  document.getElementById('prev-day').onclick=()=>shiftDate(-1);
  document.getElementById('next-day').onclick=()=>shiftDate(1);
  document.getElementById('date-display').onclick=()=>{
    const i=document.getElementById('date-input');
    try{ i.showPicker(); }catch(e){ i.click(); }
  };
  document.getElementById('date-input').onchange=e=>{ if(e.target.value) changeDate(e.target.value); };
  document.getElementById('refresh-btn').onclick=async()=>{ showToast("Refreshing…"); await refreshForDate(); };
}

function updateHeader(){
  const isToday=state.currentDate===todayStr();
  document.getElementById('date-display').textContent=fmtDateLabel(state.currentDate);
  document.getElementById('today-tag').style.display=isToday?'':'none';
  document.getElementById('date-input').value=state.currentDate;
}

async function refreshForDate(){
  updateHeader();
  document.getElementById('content').innerHTML='<div class="loading-state">Loading…</div>';
  state.data=await fbGet(state.currentDate);
  setSyncStatus(true);
  renderView();
}
async function changeDate(d){ state.currentDate=d; await refreshForDate(); }
function shiftDate(delta){
  const d=new Date(state.currentDate+'T00:00:00'); d.setDate(d.getDate()+delta);
  changeDate(toDateStr(d));
}

function computeProgress(data){
  let total=0,done=0;
  SUBJECTS.forEach(s=>{ total+=2; if(data.subjects[s.key].lecture) done++; if(data.subjects[s.key].questions) done++; });
  data.extra.forEach(t=>{ total++; if(t.done) done++; });
  return {total,done,pct:total?Math.round((done/total)*100):0};
}
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function renderView(){
  const content=document.getElementById('content');
  if(!state.data){
    content.innerHTML=`<div class="no-data">📭 Is din ke liye koi data nahi hai.<br>
      <span style="font-size:12px;color:var(--text-faint)">Student ne abhi kuch tick nahi kiya.</span></div>`;
    return;
  }
  const d=state.data;
  const p=computeProgress(d);
  const fillClass=p.pct>=80?'full':p.pct>=40?'partial':'low';

  let subjHtml='';
  SUBJECTS.forEach(s=>{
    const sub=d.subjects[s.key];
    subjHtml+=`<div class="subj-row">
      <span class="subj-name">${s.label}</span>
      <div class="ticks">
        <div class="tick-wrap"><div class="tick ${sub.lecture?'done':'skip'}"></div><div class="tick-label">Lecture</div></div>
        <div class="tick-wrap"><div class="tick ${sub.questions?'done':'skip'}"></div><div class="tick-label">20 Qs</div></div>
      </div></div>`;
  });

  let extraHtml='';
  if(d.extra.length===0){
    extraHtml='<div class="empty-extras">Koi extra task nahi.</div>';
  } else {
    d.extra.forEach(t=>{
      extraHtml+=`<div class="extra-item">
        <div class="extra-dot ${t.done?'done':'pending'}"></div>
        <span class="extra-text ${t.done?'done':''}">${esc(t.text)}</span>
        <span class="extra-status">${t.done?'✓ Done':'Pending'}</span></div>`;
    });
  }

  const subjDone=SUBJECTS.filter(s=>d.subjects[s.key].lecture&&d.subjects[s.key].questions).length;
  const extraDone=d.extra.filter(t=>t.done).length;

  content.innerHTML=`
    <div class="summary-card">
      <div class="summary-title">Aaj ka summary</div>
      <div class="summary-grid">
        <div class="summary-item">
          <div class="summary-num ${p.pct>=80?'green':p.pct>=40?'':'red'}">${p.pct}%</div>
          <div class="summary-sub">Complete</div>
        </div>
        <div class="summary-item">
          <div class="summary-num ${subjDone===SUBJECTS.length?'green':'dim'}">${subjDone}/${SUBJECTS.length}</div>
          <div class="summary-sub">Subjects</div>
        </div>
        <div class="summary-item">
          <div class="summary-num ${d.extra.length>0&&extraDone===d.extra.length?'green':'dim'}">${extraDone}/${d.extra.length}</div>
          <div class="summary-sub">Extra tasks</div>
        </div>
      </div>
      <div class="progress-strip">
        <div class="progress-track"><div class="progress-fill ${fillClass}" style="width:${p.pct}%"></div></div>
        <div class="progress-pct" style="color:${p.pct>=80?'var(--accent)':p.pct>=40?'var(--warn)':'var(--danger)'}">${p.pct}%</div>
      </div>
    </div>
    <div class="section-title">Subject-wise progress</div>
    ${subjHtml}
    <div class="section-title" style="margin-top:20px;">Extra tasks</div>
    ${extraHtml}
  `;
}

init();
</script>
</body>
</html>
